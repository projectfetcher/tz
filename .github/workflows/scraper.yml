name: Scraper
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      inspect_url:
        description: 'Set a job URL to run --inspect (canary) instead of a full scrape'
        required: false
        default: ''
concurrency:
  group: jobwebtanzania-scraper
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore tracker
        uses: actions/cache@v4
        with:
          path: |
            jobwebtanzania_processed.csv
            jobwebtanzania_flagged.csv
          key: jobwebtanzania-tracker-${{ github.run_id }}
          restore-keys: |
            jobwebtanzania-tracker-
      - name: Run scraper
        env:
          WP_BASE_URL:      ${{ secrets.WP_BASE_URL }}
          WP_USERNAME:      ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:  ${{ secrets.WP_APP_PASSWORD }}
          MISTRAL_API_KEY:  ${{ secrets.MISTRAL_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.inspect_url }}" ]; then
            python tz.py --inspect "${{ github.event.inputs.inspect_url }}"
          else
            python tz.py
          fi
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobwebtanzania-output
          path: |
            jobwebtanzania_jobs.xlsx
            jobwebtanzania_processed.csv
            jobwebtanzania_flagged.csv
          if-no-files-found: ignore
